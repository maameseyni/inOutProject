<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#43277d">
    <title>Xaliss — Hors ligne</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            font-family: system-ui, sans-serif;
            background: #43277d;
            color: #fff;
            text-align: center;
        }
        .card {
            max-width: 360px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 28px 24px;
            backdrop-filter: blur(6px);
        }
        h1 { font-size: 1.25rem; margin: 0 0 12px; }
        p { margin: 0; line-height: 1.5; opacity: 0.92; font-size: 0.95rem; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Vous êtes hors ligne</h1>
        <p>Reconnectez-vous à Internet pour synchroniser vos transactions et contacts.</p>
    </div>
</body>
</html>
