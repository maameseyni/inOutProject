{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    {% include 'partials/pwa_head.html' %}
    <title>{% block title %}Xaliss{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'css/kp-select.css' %}">
    <link rel="stylesheet" href="{% static 'css/auth.css' %}">
    {% block extra_head %}{% endblock %}
</head>
<body class="auth-page"{% block body_attrs %}{% endblock %}>
    <div class="auth-card{% block auth_card_class %}{% endblock %}">
        {% include 'partials/django_messages_data.html' %}
        {% block content %}{% endblock %}
    </div>
    <script src="{% static 'js/xaliss-flash.js' %}"></script>
    <script src="{% static 'js/kp-select.js' %}"></script>
    <script src="{% static 'js/auth.js' %}"></script>
    <script src="{% static 'js/pwa.js' %}"></script>
    {% block extra_scripts %}{% endblock %}
</body>
</html>
